# fly.toml app configuration generated for rides-server
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "rides-server"
primary_region = "del"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "5s"
  interval = "30s"
  timeout = "3s"
  type = "http"
  method = "GET"
  path = "/v1/health"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[services.tcp_checks]]
  grace_period = "5s"
  interval = "30s"
  timeout = "3s"

[metrics]
  prometheus_port = 9090

[processes]
  app = "node dist/server.js"
